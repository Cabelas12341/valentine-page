<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Love ❤️</title>

<style>
body {
  margin: 0;
  text-align: center;
  font-family: Arial;
  background: linear-gradient(to bottom right, #ff9a9e, #fad0c4);
  color: white;
  overflow: hidden;
}

#container {
  margin-top: 60px;
}

h1 {
  font-size: 26px;
  min-height: 40px;
}

img {
  width: 220px;
  margin: 20px 0;
}

button {
  padding: 14px 24px;
  font-size: 18px;
  margin: 15px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
}

#yes {
  background: red;
  color: white;
}

#no {
  background: gray;
  color: white;
  position: absolute;
}

.heart {
  position: fixed;
  top: -10px;
  font-size: 18px;
  animation: fall linear infinite;
}

@keyframes fall {
  to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<div id="container">
  <h1 id="text"></h1>

  <img src="https://i.imgur.com/OdL0XPt.png" alt="Teddy Bear">

  <div id="buttons" style="display:none;">
    <button id="yes">Yes 💖</button>
    <button id="no">No 😢</button>
  </div>

  <br>

  <a href="https://www.youtube.com/watch?v=6EEW-9NDM5k" target="_blank">
    <button>Play our song 🎵</button>
  </a>
</div>

<script>

// 💖 NAME SETTINGS
const herName = "Love";
const yourName = "Me";

// Typing effect
const message = `Hey ${herName} ❤️... I have something to ask you...`;
let i = 0;

function typeText() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeText, 50);
  } else {
    setTimeout(() => {
      document.getElementById("text").innerHTML =
        `Will you be my Valentine? 💕 - ${yourName}`;
      document.getElementById("buttons").style.display = "block";
    }, 800);
  }
}

typeText();

// Moving NO button 😈
const noBtn = document.getElementById("no");
noBtn.addEventListener("mouseover", () => {
  noBtn.style.top = Math.random() * window.innerHeight + "px";
  noBtn.style.left = Math.random() * window.innerWidth + "px";
});

// YES clicked 💖
document.getElementById("yes").onclick = () => {
  document.body.innerHTML = `
    <h1>YAAAY!!! ❤️❤️❤️</h1>
    <img src="https://i.imgur.com/8Km9tLL.gif" width="250">
    <p>Love, you just made me the happiest 😍💖</p>
  `;
};

// Floating hearts ❤️
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 5000);
}

setInterval(createHeart, 300);

</script>

</body>
</html>
